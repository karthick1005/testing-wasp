name: "Deploy"

on:
  push:
    branches:
      - main
  workflow_dispatch:

# This will make sure that only one deployment is running at a time
concurrency:
  group: deployment
  cancel-in-progress: true

env:
  WASP_VERSION: "0.16.4"
  # Put your server app name here
  SERVER_APP_NAME: "pokemon-server"
  # After you know the server URL, put the URL here
  SERVER_APP_URL: "http://api.34.136.254.179.sslip.io"
  # Put your client app name here
  CLIENT_APP_NAME: "pokemon-client"
  DOCKER_REGISTRY: "ghcr.io"
  DOCKER_REGISTRY_USERNAME: ${{ github.repository_owner }}
  # This secret is provided by GitHub by default and is used to authenticate with the Container registry
  DOCKER_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-and-push-images:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    # REMOVE this whole block if your app is not in the `app` folder
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.DOCKER_REGISTRY_USERNAME }}
          password: ${{ env.DOCKER_REGISTRY_PASSWORD }}

      - name: (server) Extract metadata for Docker
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REGISTRY_USERNAME }}/${{ env.SERVER_APP_NAME }}

      - name: (client) Extract metadata for Docker
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REGISTRY_USERNAME }}/${{ env.CLIENT_APP_NAME }}

      - name: Install Wasp
        shell: bash
        run: curl -sSL https://get.wasp-lang.dev/installer.sh | sh -s -- -v ${{ env.WASP_VERSION }}

      # --- START: Reverted and refined dependency installation ---
      # 1. First, run npm install at the app root for Wasp's server/core dependencies.
      # 2. Then, run `wasp build` which should generate the client project (`.wasp/build/web-app`).
      # 3. Finally, navigate into the generated client project and install *its* dependencies.
      #    This is crucial for the client build to find its specific modules and types.
      # ---

      - name: Install root npm dependencies
        run: npm install

      - name: Build Wasp app (generates .wasp/build and its package.json)
        shell: bash
        run: wasp build

      - name: Install client dependencies in .wasp/build/web-app
        run: |
          cd ./.wasp/build/web-app
          # Remove package-lock.json to ensure fresh install if needed,
          # but `npm install` usually handles updates.
          rm -f package-lock.json
          npm install

      - name: Dedupe npm packages in web-app (optional, but good practice for client)
        run: |
          cd ./.wasp/build/web-app
          npm dedupe
      # --- END: Reverted and refined dependency installation ---

      - name: (client) Build
        run: |
          cd ./.wasp/build/web-app
          # Address potential TypeScript config issues for `tsc --build` and `vite build`
          # by trying to modify tsconfig.json on the fly if standard solutions fail.
          #
          # NOTE: This is a diagnostic/patching step. The ideal solution is
          # for Wasp to generate a correct tsconfig or for your original
          # tsconfig.json to have these settings.
          # If your local build works fine, these modifications might not be needed.
          #
          # Proposed additions to tsconfig.json (adjust path if needed):
          # 1. "esModuleInterop": true
          # 2. "module": "esnext" (or "node16", "nodenext")
          # 3. Add compilerOptions.types if necessary for missing globals.
          # 4. Handle "File '@tsconfig/vite-react/tsconfig.json' not found." if it's not a common base.

          # Let's try to patch tsconfig.json if it exists, for esModuleInterop and module
          if [ -f tsconfig.json ]; then
            echo "Patching tsconfig.json for esModuleInterop and module..."
            jq '.compilerOptions.esModuleInterop = true | .compilerOptions.module = "esnext"' tsconfig.json > temp.json && mv temp.json tsconfig.json
          fi
          # Also check tsconfig.app.json if it exists and has issues
          if [ -f tsconfig.app.json ]; then
            echo "Patching tsconfig.app.json for esModuleInterop and module..."
            jq '.compilerOptions.esModuleInterop = true | .compilerOptions.module = "esnext"' tsconfig.app.json > temp.json && mv temp.json tsconfig.app.json
            # For "File '@tsconfig/vite-react/tsconfig.json' not found."
            # This means the base config isn't found. You might need to:
            # A) Ensure it's installed as a dev dependency.
            # B) Replace the `extends` with explicit settings if it's simple.
            # For now, let's assume it's a path issue or missing dependency.
            # If it's a common dependency that should be in node_modules,
            # `npm install` in web-app might fix it.
          fi

          # Now run the build command
          REACT_APP_API_URL=${{ env.SERVER_APP_URL }} npm run build

      - name: (client) Prepare the Dockerfile
        shell: bash
        run: |
          cd ./.wasp/build/web-app
          echo "FROM pierrezemb/gostatic" > Dockerfile
          echo "CMD [\"-fallback\", \"index.html\", \"-enable-logging\"]" >> Dockerfile
          echo "COPY ./build /srv/http" >> Dockerfile

      - name: (server) Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          # REMOVE the `app` bit from the path if your app is not in the `app` folder
          context: ./app/.wasp/build
          # REMOVE the `app` bit from the path if your app is not in the `app` folder
          file: ./app/.wasp/build/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}

      - name: (client) Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          # REMOVE the `app` bit from the path if your app is not in the `app` folde
          context: ./app/.wasp/build/web-app
          # REMOVE the `app` bit from the path if your app is not in the `app` folder
          file: ./app/.wasp/build/web-app/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}

      # You can get the webhook URLs from the Coolify dashboard
      # Put them in the repository secrets under CLIENT_COOLIFY_WEBHOOK and SERVER_COOLIFY_WEBHOOK
      - name: Trigger Deploy Webhooks
        env:
          CLIENT_COOLIFY_WEBHOOK: ${{ secrets.CLIENT_COOLIFY_WEBHOOK }}
          SERVER_COOLIFY_WEBHOOK: ${{ secrets.SERVER_COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          curl "${{ env.CLIENT_COOLIFY_WEBHOOK }}" --header 'Authorization: Bearer ${{ env.COOLIFY_TOKEN }}'
          curl "${{ env.SERVER_COOLIFY_WEBHOOK }}" --header 'Authorization: Bearer ${{ env.COOLIFY_TOKEN }}'
